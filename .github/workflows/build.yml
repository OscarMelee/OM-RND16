name: Build VCV Rack Plugin

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc mingw-w64-x86_64-make unzip

      - name: Download Rack SDK
        run: |
          curl -L -o Rack-SDK.zip "https://vcvrack.com/downloads/Rack-SDK-2.6.6-win-x64.zip"
          unzip Rack-SDK.zip

      - name: Build plugin
        run: |
          export RACK_DIR="$(pwd)/Rack-SDK"
          mkdir -p build
          
          g++ -std=c++11 -O3 -fPIC -march=nehalem \
            -D_USE_MATH_DEFINES \
            -I"$RACK_DIR/include" -I"$RACK_DIR/dep/include" \
            -c src/plugin.cpp -o build/plugin.o
          
          g++ -std=c++11 -O3 -fPIC -march=nehalem \
            -D_USE_MATH_DEFINES \
            -I"$RACK_DIR/include" -I"$RACK_DIR/dep/include" \
            -c src/RND16.cpp -o build/RND16.o
          
          g++ -shared -static-libstdc++ -static-libgcc \
            -o plugin.dll build/plugin.o build/RND16.o \
            -L"$RACK_DIR" -lRack

      - name: Create artifact
        run: |
          mkdir -p dist/OM-RND16
          cp plugin.dll dist/OM-RND16/
          cp plugin.json dist/OM-RND16/
          cp -r res dist/OM-RND16/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OM-RND16-win-x64
          path: dist/OM-RND16/

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: OM-RND16-win-x64
          path: OM-RND16/

      - name: Create release package
        run: tar --zstd -cf OM-RND16-1.0.0-win-x64.vcvplugin OM-RND16

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.0
          name: Release v1.0.0
          files: OM-RND16-1.0.0-win-x64.vcvplugin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
